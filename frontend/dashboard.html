<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">

<!-- Sidebar -->
<div class="w-64 h-screen bg-slate-900 text-white p-5">

<h2 class="text-2xl font-bold mb-8">Admin Panel</h2>

<ul class="space-y-4">

<li class="hover:text-blue-400 cursor-pointer">Dashboard</li>
<li class="hover:text-blue-400 cursor-pointer">Users</li>
<li class="hover:text-blue-400 cursor-pointer">Staff</li>
<li class="hover:text-blue-400 cursor-pointer">Students</li>
<li class="hover:text-blue-400 cursor-pointer">Courses</li>
<li class="hover:text-blue-400 cursor-pointer">Batches</li>
<li class="hover:text-blue-400 cursor-pointer">Topics</li>
<li class="hover:text-blue-400 cursor-pointer">Attendance</li>
<li class="hover:text-blue-400 cursor-pointer">Leave</li>
<li class="hover:text-blue-400 cursor-pointer">Payroll</li>

</ul>

</div>

<!-- Main Content -->
<div class="flex-1 p-6">

<!-- Top Bar -->
<div class="flex justify-between items-center mb-6">

<input type="text" placeholder="Search..."
class="border rounded px-3 py-2 w-64">

<div class="flex items-center space-x-4">

<span class="text-gray-600">🔔</span>
<img src="https://i.pravatar.cc/40" class="rounded-full">

</div>

</div>

<!-- Cards -->
<div class="grid grid-cols-4 gap-6 mb-8">

<div class="bg-white p-5 rounded shadow">
<h3 class="text-gray-500">Staff</h3>
<p class="text-2xl font-bold">12</p>
</div>

<div class="bg-white p-5 rounded shadow">
<h3 class="text-gray-500">Students</h3>
<p class="text-2xl font-bold">120</p>
</div>

<div class="bg-white p-5 rounded shadow">
<h3 class="text-gray-500">Courses</h3>
<p class="text-2xl font-bold">8</p>
</div>

<div class="bg-white p-5 rounded shadow">
<h3 class="text-gray-500">Batches</h3>
<p class="text-2xl font-bold">5</p>
</div>

</div>

<!-- Chart Section -->
<div class="bg-white p-6 rounded shadow mb-8">

<h2 class="text-xl font-semibold mb-4">Training Activity</h2>

<div class="h-48 flex items-center justify-center text-gray-400">
Chart Area
</div>

</div>

<!-- Quick Actions -->
<div class="grid grid-cols-3 gap-6">

<button class="bg-blue-600 text-white p-4 rounded hover:bg-blue-700">
Add Staff
</button>

<button class="bg-green-600 text-white p-4 rounded hover:bg-green-700">
Add Student
</button>

<button class="bg-purple-600 text-white p-4 rounded hover:bg-purple-700">
Create Course
</button>

</div>

</div>

</div>

</body>
</html>
